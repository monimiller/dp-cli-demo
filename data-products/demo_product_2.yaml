# Data Product Definition
# Generated by: starburst data-product init
# Edit this file to define your data product, then validate with: starburst data-product lint -f <file>
apiVersion: v1
kind: DataProduct

metadata:
  # Name of the data product (required)
  name: demo_product_2
  # Catalog where the data product will be created (required)
  catalogName: hive_glue
  # Data domain this product belongs to (required)
  dataDomainName: Monica CLI
  # Short summary of the data product (required)
  summary: TODO - add a short summary
  # Optional longer description
  # description: ""

# Data product owners (optional)
# owners:
#   - name: Owner Name
#     email: owner@example.com

# Tags for categorization (optional)
# tags:
#   - example-tag

# Links to external resources (optional)
# relevantLinks:
#   - label: Documentation
#     url: https://example.com/docs

# Sample queries to demonstrate usage (optional)
# sampleQueries:
#   - name: Basic query
#     description: A simple example query
#     query: SELECT * FROM my_view LIMIT 10

# View datasets
views:
  - name: example_view
    # Optional description
    # description: An example view
    definitionQuery: |
      SELECT 1 AS id, 'example' AS value
    columns:
      - name: id
        type: integer
        # description: Primary identifier
      - name: value
        type: varchar
        # description: Example value

# Materialized view datasets
materializedViews:
  - name: example_mv
    definitionQuery: |
      SELECT 1 AS id
    definitionProperties:
      refresh_interval: 1h
    columns:
      - name: id
        type: integer
