apiVersion: v1
kind: DataProduct
metadata:
  name: dataproduct_3
  catalogName: hive_glue
  dataDomainName: Product
  summary: Clone of demo product for dataproduct_3
  description: |
    Cloned from demo_product for the Product domain on hive_glue.

owners:
  - name: Phoebe Miller
    email: phoebe.miller@starburstdata.com
views:
  - name: sample_orders
    description: A sample orders view for demo purposes
    definitionQuery: |
      SELECT
        orderkey,
        custkey,
        orderstatus,
        totalprice,
        orderdate
      FROM tpch.tiny.orders
    columns:
      - name: orderkey
        type: bigint
        description: Order identifier
      - name: custkey
        type: bigint
        description: Customer identifier
      - name: orderstatus
        type: varchar
        description: Status of the order
      - name: totalprice
        type: double
        description: Total price of the order
      - name: orderdate
        type: date
        description: Date the order was placed
