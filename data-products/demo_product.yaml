apiVersion: v1
kind: DataProduct
metadata:
  name: demo_product
  catalogName: hive_glue_mv
  dataDomainName: Product
  summary: A demo data product created via the starburst CLI
  description: |
    This data product demonstrates the full lifecycle of data-products-as-code:
    init, lint, import, export, modify, re-import, and publish. 

owners:
  - name: Phoebe Miller
    email: phoebe.miller@starburstdata.com
views:
  - name: sample_orders
    description: A sample orders view for demo purposes
    definitionQuery: |
      SELECT
        orderkey,
        custkey,
        orderstatus,
        totalprice,
        orderdate
      FROM tpch.tiny.orders
    columns:
      - name: orderkey
        type: bigint
        description: Order identifier
      - name: custkey
        type: bigint
        description: Customer identifier
      - name: orderstatus
        type: varchar
        description: Status of the order
      - name: totalprice
        type: double
        description: Total price of the order
      - name: orderdate
        type: date
        description: Date the order was placed
