name: Deploy Data Product

on:
  workflow_dispatch:
    inputs:
      yaml_path:
        description: Path to the data product YAML file
        required: true
        default: data-products/demo_product.yaml
        type: string
      duplicate_mode:
        description: Duplicate handling strategy during import
        required: true
        default: OVERWRITE
        type: choice
        options:
          - OVERWRITE
          - FAIL
      create_demo_pr:
        description: Create/update a demo PR after successful deploy
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-data-product
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve CLI jar
        id: cli
        env:
          CLI_JAR_SECRET: ${{ secrets.CLI_JAR }}
        run: |
          set -euo pipefail

          if [ -z "${CLI_JAR_SECRET}" ]; then
            echo "Secret CLI_JAR is required." >&2
            exit 1
          fi

          if [[ "${CLI_JAR_SECRET}" =~ ^https?:// ]]; then
            curl -fsSL "${CLI_JAR_SECRET}" -o ./starburst-cli.jar
            echo "path=$PWD/starburst-cli.jar" >> "$GITHUB_OUTPUT"
          elif [ -f "${CLI_JAR_SECRET}" ]; then
            echo "path=${CLI_JAR_SECRET}" >> "$GITHUB_OUTPUT"
          else
            echo "CLI_JAR must be an HTTP(S) URL or a path available in the runner." >&2
            exit 1
          fi

      - name: Validate YAML path
        run: |
          set -euo pipefail
          if [ ! -f "${{ inputs.yaml_path }}" ]; then
            echo "YAML file not found: ${{ inputs.yaml_path }}" >&2
            exit 1
          fi

      - name: Lint data product YAML
        run: |
          set -euo pipefail
          java -jar "${{ steps.cli.outputs.path }}" data-product lint -f "${{ inputs.yaml_path }}"

      - name: Import data product
        env:
          SERVER: ${{ secrets.SERVER }}
          ROLE: ${{ secrets.ROLE }}
          STARBURST_USER: ${{ secrets.STARBURST_USER }}
          STARBURST_PASSWORD: ${{ secrets.STARBURST_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s\n' "${STARBURST_PASSWORD}" | java -jar "${{ steps.cli.outputs.path }}" data-product import \
            -f "${{ inputs.yaml_path }}" \
            --server "${SERVER}" \
            --user "${STARBURST_USER}" \
            --password \
            --insecure \
            --role "${ROLE}" \
            --on-duplicate "${{ inputs.duplicate_mode }}"

      - name: Write deploy summary
        if: ${{ always() }}
        run: |
          {
            echo "## Data Product Deploy"
            echo "- YAML: \`${{ inputs.yaml_path }}\`"
            echo "- Duplicate mode: \`${{ inputs.duplicate_mode }}\`"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  demo_pr:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ needs.deploy.result == 'success' && inputs.create_demo_pr }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bump demo marker
        run: |
          set -euo pipefail
          mkdir -p data-products
          {
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "triggered_by=${{ github.actor }}"
            echo "yaml_path=${{ inputs.yaml_path }}"
            echo "updated_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > data-products/.demo-pr-version

      - name: Create or update demo PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: demo/pr-bump
          delete-branch: true
          base: ${{ github.event.repository.default_branch }}
          title: "demo: bump marker after deploy"
          commit-message: "demo: bump marker after deploy"
          body: |
            This automated PR updates the demo marker after a successful deploy.

            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Deployed YAML: `${{ inputs.yaml_path }}`
          add-paths: |
            data-products/.demo-pr-version

      - name: Write demo PR summary
        run: |
          {
            echo "## Demo PR"
            if [ -n "${{ steps.cpr.outputs.pull-request-url }}" ]; then
              echo "- PR: ${{ steps.cpr.outputs.pull-request-url }}"
            else
              echo "- PR: No changes detected; no PR created."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
