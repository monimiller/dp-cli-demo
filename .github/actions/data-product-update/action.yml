name: Data Product Update
description: Lint and import a data product YAML using Starburst CLI.

inputs:
  yaml_path:
    description: Path to the data product YAML file.
    required: true
  duplicate_mode:
    description: Duplicate handling strategy during import.
    required: true
  server:
    description: Starburst server URL.
    required: true
  role:
    description: Starburst role for import.
    required: true
  starburst_user:
    description: Starburst username.
    required: true
  starburst_password:
    description: Starburst password.
    required: true
  cli_jar:
    description: HTTP(S) URL or runner-local path to Starburst CLI jar.
    required: true
  insecure:
    description: Whether to pass --insecure to the CLI import command.
    required: false
    default: "true"
  run_lint:
    description: Whether to lint before import.
    required: false
    default: "true"
  write_summary:
    description: Whether to write result to GITHUB_STEP_SUMMARY.
    required: false
    default: "true"

outputs:
  status:
    description: Action status (success or failure).
    value: ${{ steps.set_status.outputs.status }}
  deployed_yaml:
    description: YAML path deployed by the action.
    value: ${{ steps.set_outputs.outputs.deployed_yaml }}
  duplicate_mode_used:
    description: Duplicate mode used by the import command.
    value: ${{ steps.set_outputs.outputs.duplicate_mode_used }}

runs:
  using: composite
  steps:
    - name: Resolve CLI jar
      id: resolve_cli
      shell: bash
      env:
        CLI_JAR_INPUT: ${{ inputs.cli_jar }}
      run: |
        set -euo pipefail

        if [ -z "${CLI_JAR_INPUT}" ]; then
          echo "Input cli_jar is required." >&2
          exit 1
        fi

        if [[ "${CLI_JAR_INPUT}" =~ ^https?:// ]]; then
          curl -fsSL "${CLI_JAR_INPUT}" -o ./starburst-cli.jar
          echo "path=$PWD/starburst-cli.jar" >> "$GITHUB_OUTPUT"
        elif [ -f "${CLI_JAR_INPUT}" ]; then
          echo "path=${CLI_JAR_INPUT}" >> "$GITHUB_OUTPUT"
        else
          echo "cli_jar must be an HTTP(S) URL or a path available in the runner." >&2
          exit 1
        fi

    - name: Validate YAML path
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f "${{ inputs.yaml_path }}" ]; then
          echo "YAML file not found: ${{ inputs.yaml_path }}" >&2
          exit 1
        fi

    - name: Lint data product YAML
      if: ${{ inputs.run_lint == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        java -jar "${{ steps.resolve_cli.outputs.path }}" data-product lint -f "${{ inputs.yaml_path }}"

    - name: Import data product
      id: import_data_product
      shell: bash
      env:
        SERVER: ${{ inputs.server }}
        ROLE: ${{ inputs.role }}
        STARBURST_USER: ${{ inputs.starburst_user }}
        STARBURST_PASSWORD: ${{ inputs.starburst_password }}
      run: |
        set -euo pipefail
        INSECURE_FLAG=""
        if [ "${{ inputs.insecure }}" = "true" ]; then
          INSECURE_FLAG="--insecure"
        fi

        printf '%s\n' "${STARBURST_PASSWORD}" | java -jar "${{ steps.resolve_cli.outputs.path }}" data-product import \
          -f "${{ inputs.yaml_path }}" \
          --server "${SERVER}" \
          --user "${STARBURST_USER}" \
          --password \
          ${INSECURE_FLAG} \
          --role "${ROLE}" \
          --on-duplicate "${{ inputs.duplicate_mode }}"

    - name: Write deploy summary
      if: ${{ always() && inputs.write_summary == 'true' }}
      shell: bash
      run: |
        {
          echo "## Data Product Deploy"
          echo "- YAML: \`${{ inputs.yaml_path }}\`"
          echo "- Duplicate mode: \`${{ inputs.duplicate_mode }}\`"
          echo "- Result: \`${{ job.status }}\`"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Set action outputs
      id: set_outputs
      if: ${{ always() }}
      shell: bash
      run: |
        echo "deployed_yaml=${{ inputs.yaml_path }}" >> "$GITHUB_OUTPUT"
        echo "duplicate_mode_used=${{ inputs.duplicate_mode }}" >> "$GITHUB_OUTPUT"

    - name: Set status output
      id: set_status
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ steps.import_data_product.outcome }}" = "success" ]; then
          echo "status=success" >> "$GITHUB_OUTPUT"
        else
          echo "status=failure" >> "$GITHUB_OUTPUT"
        fi
